<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HouseLoop — Gestión de Propiedades</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #FAFAFA;
      color: #1C150F;
    }
    h1 { color: #F36162; }
    h2 { color: #1C150F; margin-top: 40px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #E0E0E0;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }
    button {
      background: #F36162;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      margin-top: 8px;
    }
    button:hover { background: #F03E3F; }
  </style>
</head>
<body>

  <h1>🏠 HouseLoop — Gestión de Propiedades</h1>

  <!-- ── CREAR PROPIEDAD ── -->
  <h2>Crear Propiedad</h2>
  <form action="/propiedades" method="post">
    <div class="form-group">
      <label>Título</label>
      <input type="text" name="titulo" placeholder="Ej: Apartamento en el centro" required>
    </div>
    <div class="form-group">
      <label>Descripción</label>
      <textarea name="descripcion" rows="3" placeholder="Describe la propiedad..." required></textarea>
    </div>
    <div class="form-group">
      <label>Precio</label>
      <input type="number" name="precio" placeholder="Ej: 350000000" required>
    </div>
    <div class="form-group">
      <label>Área m²</label>
      <input type="number" name="area_m2" placeholder="Ej: 80">
    </div>
    <div class="form-group">
      <label>Habitaciones</label>
      <input type="number" name="habitaciones" placeholder="Ej: 3">
    </div>
    <div class="form-group">
      <label>Baños</label>
      <input type="number" name="banos" placeholder="Ej: 2">
    </div>
    <div class="form-group">
      <label>Tipo de operación</label>
      <select name="tipo_operacion" required>
        <option value="venta">Venta</option>
        <option value="arriendo">Arriendo</option>
      </select>
    </div>
    <div class="form-group">
      <label>Tipo de inmueble</label>
      <select name="tipo_inmueble">
        <option value="casa">Casa</option>
        <option value="apartamento">Apartamento</option>
        <option value="local">Local</option>
        <option value="lote">Lote</option>
        <option value="finca">Finca</option>
      </select>
    </div>
    <div class="form-group">
      <label>Estado</label>
      <select name="estado" required>
        <option value="disponible">Disponible</option>
        <option value="vendido">Vendido</option>
        <option value="arrendado">Arrendado</option>
      </select>
    </div>
    <div class="form-group">
      <label>ID Usuario</label>
      <input type="text" name="id_usuario" placeholder="Ej: USR001" required>
    </div>
    <div class="form-group">
      <label>ID Ubicación</label>
      <input type="text" name="id_ubicacion" placeholder="Ej: UBI001" required>
    </div>
    <div class="form-group">
      <label>URL Video</label>
      <input type="text" name="video" placeholder="Ej: https://video.com/propiedad1">
    </div>
    <div class="form-group">
      <label>URLs Fotos (separadas por coma)</label>
      <input type="text" name="fotos" placeholder="Ej: foto1.jpg, foto2.jpg">
    </div>
    <button type="submit">Guardar Propiedad</button>
  </form>
  <!-- ── LISTA DE PROPIEDADES ── -->
  <h2>Propiedades registradas</h2>
  <button onclick="cargarPropiedades()" style="width:auto; padding: 10px 20px; margin-bottom: 16px;">
    Ver propiedades
  </button>
  <div id="lista-propiedades"></div>

  <script>
  async function cargarPropiedades() {
    const response = await fetch('/propiedades');
    const propiedades = await response.json();
    
    const lista = document.getElementById('lista-propiedades');
    
    if (propiedades.length === 0) {
      lista.innerHTML = '<p>No hay propiedades registradas.</p>';
      return;
    }

    lista.innerHTML = propiedades.map(p => `
      <div style="border: 1px solid #E0E0E0; border-radius: 8px; padding: 16px; margin-bottom: 12px;">
        <h3 style="color: #F36162; margin: 0 0 8px 0;">${p.titulo}</h3>
        <p><b>Precio:</b> $${p.precio}</p>
        <p><b>Tipo:</b> ${p.tipo_operacion} — ${p.tipo_inmueble}</p>
        <p><b>Estado:</b> ${p.estado}</p>
        <p><b>Descripción:</b> ${p.descripcion}</p>
      </div>
    `).join('');
  }
</script>
</body>
</html>
